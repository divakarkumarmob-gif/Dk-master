<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F5F0" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0A0A0A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=NP&background=2563eb&color=fff&size=180" />
    <title>NEET Prep</title>
  </head>
  <body>
    <!-- Diagnostic indicator -->
    <div id="html-served-indicator" style="display:none; background: #22c55e; color: white; padding: 4px 8px; position: fixed; top: 0; left: 0; z-index: 999999; font-family: sans-serif; font-size: 10px; font-weight: bold;">HTML SERVED</div>
    <script>document.getElementById('html-served-indicator').style.display = 'block';</script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered', reg))
            .catch(err => console.log('SW Failed', err));
        });
      }
    </script>
  </body>
</html>
