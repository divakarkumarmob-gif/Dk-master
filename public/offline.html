<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - StudyMaster</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #000000;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        h1 {
            font-weight: 900;
            margin: 0;
            letter-spacing: -1px;
        }
        p {
            opacity: 0.7;
            font-weight: 500;
            margin-top: 10px;
        }
        button {
            margin-top: 30px;
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="icon">📡</div>
    <h1>StudyMaster</h1>
    <p>You're offline. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
</body>
</html>
